<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Triasix Capital Group</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}
html{scroll-behavior:smooth}

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#050505;
color:#eaeaea
}

/* BARRA */
#progressBar{
position:fixed;
top:0;
left:0;
height:4px;
background:linear-gradient(90deg,#25D366,#00ffa6);
width:0%;
z-index:9999
}

/* HEADER */
header{
position:fixed;
width:100%;
top:0;
left:0;
padding:18px 40px;
background:rgba(0,0,0,.35);
backdrop-filter:blur(10px);
z-index:1000;
transition:.3s
}

header.scrolled{
background:#000;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
max-width:1400px;
margin:auto
}

.logo{
display:flex;
align-items:center;
gap:10px;
color:white;
text-decoration:none
}

.logo img{
height:60px
}

nav a{
color:#cfcfcf;
margin-left:25px;
text-decoration:none
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.8)),url("portada.jpg");
background-size:cover;
}

.btn{
background:#25D366;
padding:14px 30px;
border-radius:8px;
color:white;
text-decoration:none;
}

/* SECCIONES */
section{
padding:100px 20px;
max-width:1200px;
margin:auto;
}

.section-title{
text-align:center;
font-size:40px;
margin-bottom:40px;
}

/* GALERIA */
.gallery{
column-count:3;
gap:10px;
}

.gallery img{
width:100%;
margin-bottom:10px;
border-radius:10px;
cursor:pointer;
}

/* LIGHTBOX */
#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:none;
align-items:center;
justify-content:center;
}

#lightbox img{
max-width:90%;
max-height:90%;
}

/* WHATSAPP */
.whatsapp-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

</style>
</head>

<body>

<div id="progressBar"></div>

<header id="mainHeader">
<nav>

<a href="#" class="logo">
<img src="logo.png">
<strong>TRIASIX</strong>
</a>

<div>
<a href="#servicios">Servicios</a>
<a href="#catalogo">Catálogo</a>
<a href="#galeria">Proyectos</a>
<a href="#contacto">Contacto</a>
</div>

</nav>
</header>

<!-- HERO -->
<section class="hero">
<h1>Arquitectura en Aluminio y Vidrio</h1>
<p>Fabricación e instalación en Bogotá</p>
<a class="btn" href="https://wa.me/573053399795">Cotizar</a>
</section>

<!-- SERVICIOS -->
<section id="servicios">
<h2 class="section-title">Servicios</h2>
<p>Ventanas, barandas, divisiones y más.</p>
</section>

<!-- CATALOGO -->
<section id="catalogo">
<h2 class="section-title">Catálogo</h2>

<iframe src="catalogo-triasix.pdf" width="100%" height="500"></iframe>

</section>

<!-- GALERIA -->
<section id="galeria">
<h2 class="section-title">Proyectos</h2>

<div class="gallery">
<img src="proyecto1.jpg" onclick="openLightbox(this)">
<img src="proyecto2.jpg" onclick="openLightbox(this)">
<img src="proyecto3.jpg" onclick="openLightbox(this)">
</div>

</section>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
<img id="lightbox-img">
</div>

<!-- CONTACTO -->
<section id="contacto">
<h2 class="section-title">Contacto</h2>

<form action="https://formspree.io/f/xaqpdvpb" method="POST">
<input type="text" name="nombre" placeholder="Nombre" required><br><br>
<input type="email" name="email" placeholder="Email" required><br><br>
<textarea name="mensaje" placeholder="Mensaje"></textarea><br><br>
<button class="btn">Enviar</button>
</form>

</section>

<footer style="text-align:center;padding:30px;">
© 2026 Triasix Capital Group
</footer>

<a class="whatsapp-float" href="https://wa.me/573053399795">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="30">
</a>

<script>

/* SCROLL BAR */
window.onscroll=function(){
let winScroll=document.documentElement.scrollTop;
let height=document.documentElement.scrollHeight-document.documentElement.clientHeight;
let scrolled=(winScroll/height)*100;
document.getElementById("progressBar").style.width=scrolled+"%";
}

/* HEADER */
const header=document.getElementById('mainHeader');

window.addEventListener('scroll',()=>{
if(window.scrollY>50){
header.classList.add('scrolled')
}else{
header.classList.remove('scrolled')
}
});

/* LIGHTBOX */
function openLightbox(img){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=img.src;
}

function closeLightbox(){
document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
